# Run the Presidio Analyzer as a local service for fast, in-memory PII detection.
# The hooks call http://localhost:5002/analyze on each event, so the heavy spaCy
# model loads ONCE here instead of on every short-lived hook process.
#
#   docker compose -f docker-compose.yml up -d
#
# Then point the plugin at it (this is the default):
#   export PRESIDIO_ANALYZER_URL=http://localhost:5002
#
# The anonymizer image is optional — blackbar applies replace/redact/mask/
# hash locally and only needs the analyzer. Add the anonymizer only if you want
# the encrypt operator end-to-end without the Python library.

services:
  presidio-analyzer:
    # Comprehensive PII/PHI/financial analyzer (en, es, fr, de, it, pt), md
    # spaCy models by default. Runs the shared analyzer_service.py — the same
    # service as the no-Docker native path. The image is published, so this
    # pulls automatically; use :lg for the large models. To build a custom
    # variant instead (pick languages/size with build args LANGS, MODEL_SIZE):
    #   docker build -t e2its/presidio-analyzer-multilang:latest ./presidio-native
    # For English only, swap the image line for:
    #   mcr.microsoft.com/presidio-analyzer:latest
    image: e2its/presidio-analyzer-multilang:latest
    # Bind all interfaces INSIDE the container so the host reaches it through the
    # port map; the host only publishes it on 127.0.0.1 (not the LAN), since this
    # processes PII.
    environment:
      BLACKBAR_BIND_HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:5002:3000"
    restart: unless-stopped

  # Optional — uncomment to also run the anonymizer service.
  # presidio-anonymizer:
  #   image: mcr.microsoft.com/presidio-anonymizer:latest
  #   ports:
  #     - "5001:3000"
  #   restart: unless-stopped
